{% extends "base.html" %}
{% block title %}VeilCoin - Wallet{% endblock %}
{% block content %}
<div class="container">
    <h1 style="color:#20c997;">Wallet</h1>
    
    <div class="row">
        <div class="col-md-6 mb-3">
            <div class="card" style="background:#1a1a2e;">
                <div class="card-body">
                    <h5 style="color:#fff;">Créer</h5>
                    <input type="text" id="create-name" class="form-control mb-2" style="background:#0d0d1a;color:#fff;">
                    <button class="btn" style="background:#20c997;color:#000;width:100%;" onclick="createWallet()">Créer</button>
                    <div id="create-result" style="margin-top:10px;"></div>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card" style="background:#1a1a2e;">
                <div class="card-body">
                    <h5 style="color:#fff;">Connexion</h5>
                    <input type="text" id="login-name" class="form-control mb-2" style="background:#0d0d1a;color:#fff;">
                    <textarea id="login-seed" class="form-control mb-2" rows="2" style="background:#0d0d1a;color:#fff;"></textarea>
                    <button class="btn" style="background:#6f42c1;color:#fff;width:100%;" onclick="loginWallet()">Connexion</button>
                    <div id="login-result" style="margin-top:10px;"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="wallet-connected" style="display:none;">
        <div class="row">
            <div class="col-md-4"><div class="card" style="background:#1a1a2e;"><div class="card-body text-center"><h5 style="color:#fff;">Adresse</h5><code id="wallet-address" style="color:#20c997;"></code></div></div></div>
            <div class="col-md-4"><div class="card" style="background:#1a1a2e;"><div class="card-body text-center"><h5 style="color:#fff;">Solde</h5><h2 id="wallet-balance" style="color:#0dcaf0;">0</h2></div></div></div>
            <div class="col-md-4"><div class="card" style="background:#1a1a2e;"><div class="card-body text-center"><h5 style="color:#fff;">Valeur</h5><h2 id="wallet-eur" style="color:#ffc107;">€0</h2></div></div></div>
        </div>
        <button class="btn" style="background:none;border:1px solid #e94560;color:#e94560;margin-top:15px;" onclick="logoutWallet()">Déconnexion</button>
    </div>
</div>

<script>
var cw=null;
async function createWallet(){
    var n=document.getElementById('create-name').value.trim();
    if(!n)return;
    var r=await fetch('/api/wallet/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});
    var d=await r.json();
    if(d.success){
        document.getElementById('create-result').innerHTML='<div style="color:#20c997;">✅ Créé!<br><code>'+d.seed_phrase+'</code></div>';
        document.getElementById('login-name').value=n;
        document.getElementById('login-seed').value=d.seed_phrase;
    }
}
async function loginWallet(){
    var n=document.getElementById('login-name').value.trim();
    var s=document.getElementById('login-seed').value.trim();
    var r=await fetch('/api/wallet/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,seed_phrase:s})});
    var d=await r.json();
    if(d.success){
        cw=d.name;
        document.getElementById('wallet-connected').style.display='block';
        document.getElementById('wallet-address').textContent=d.address.substring(0,20)+'...';
        loadBalance();
    }
}
async function loadBalance(){
    var r=await fetch('/api/wallet/'+cw+'/balance');
    var d=await r.json();
    document.getElementById('wallet-balance').textContent=(d.balance_veil||0).toFixed(4);
    document.getElementById('wallet-eur').textContent='€'+(d.balance_eur||0).toFixed(6);
}
async function logoutWallet(){
    await fetch('/api/wallet/logout',{method:'POST'});
    cw=null;
    document.getElementById('wallet-connected').style.display='none';
}
</script>
{% endblock %}
