{% extends "base.html" %}

{% block title %}Admin - Wallets{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="text-center mb-4">🛡️ Administration - Wallets</h1>
    
    <!-- Formulaire de récupération rapide -->
    <div class="card bg-dark mb-4">
        <div class="card-header">
            <h4>💰 Récupération rapide de VEIL</h4>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <label>Wallet source</label>
                    <input type="text" id="recover-from" class="form-control bg-dark text-white" placeholder="ex: mauvais_vendeur">
                </div>
                <div class="col-md-4">
                    <label>Wallet destination</label>
                    <input type="text" id="recover-to" class="form-control bg-dark text-white" placeholder="ex: treasury" value="treasury">
                </div>
                <div class="col-md-4">
                    <label>Raison</label>
                    <input type="text" id="recover-reason" class="form-control bg-dark text-white" placeholder="ex: Fraude">
                </div>
            </div>
            <button id="recover-btn" class="btn btn-warning w-100 mt-3">💰 Récupérer TOUS les VEIL</button>
        </div>
    </div>
    
    <!-- Liste des wallets -->
    <div class="card bg-dark">
        <div class="card-header">
            <h4>👛 Tous les wallets</h4>
            <div class="float-end">
                <a href="/admin/proofs" class="btn btn-sm btn-info me-2">📸 Preuves</a>
                <button id="logout-btn" class="btn btn-sm btn-danger">Déconnexion</button>
            </div>
        </div>
        <div class="card-body">
            <div id="wallets-list" class="text-center">
                <p>Chargement...</p>
            </div>
        </div>
    </div>
</div>

<script>
const adminSeed = sessionStorage.getItem('admin_seed');
if (!adminSeed) {
    window.location.href = '/admin/login';
}

async function loadWallets() {
    try {
        const res = await fetch('/api/admin/wallets?admin_seed=' + adminSeed);
        const data = await res.json();
        
        const container = document.getElementById('wallets-list');
        if (!data.wallets || data.wallets.length === 0) {
            container.innerHTML = '<p>Aucun wallet</p>';
            return;
        }
        
        let html = '<div class="table-responsive"><table class="table table-dark">';
        html += '<thead><tr><th>Wallet</th><th>Balance</th><th>Score</th><th>Statut</th><th>Succès</th><th>Échecs</th><th>Reports</th><th>Actions</th></tr></thead><tbody>';
        
        for (let w of data.wallets) {
            let statusClass = '';
            if (w.reputation_score >= 70) statusClass = 'text-success';
            else if (w.reputation_score >= 50) statusClass = 'text-warning';
            else statusClass = 'text-danger';
            
            html += `<tr>
                <td><strong>${w.name}</strong><br><small class="text-muted">${w.address ? w.address.substring(0, 20) + '...' : 'N/A'}</small></td>
                <td>${w.balance.toFixed(2)} VEIL</td>
                <td class="${statusClass}">${w.reputation_score}</td>
                <td class="${statusClass}">${w.reputation_status}</td>
                <td class="text-center">${w.completed_trades}</td>
                <td class="text-danger">${w.failed_trades}</td>
                <td class="text-warning">${w.reports}</td>
                <td>
                    <button class="btn btn-sm btn-success" onclick="updateRep('${w.name}', 'add_success')" title="+2 points">➕</button>
                    <button class="btn btn-sm btn-danger" onclick="updateRep('${w.name}', 'add_failure')" title="-25 points">➖</button>
                    <button class="btn btn-sm btn-warning" onclick="updateRep('${w.name}', 'add_report')" title="-15 points">⚠️</button>
                    <button class="btn btn-sm btn-info" onclick="setScore('${w.name}')" title="Définir score">🎯</button>
                    <button class="btn btn-sm btn-dark" onclick="banWallet('${w.name}')" title="Bannir">🚫</button>
                    <button class="btn btn-sm btn-warning" onclick="recoverWallet('${w.name}')" title="Récupérer VEIL">💰 Récupérer</button>
                </td>
            </tr>`;
        }
        html += '</tbody></table></div>';
        container.innerHTML = html;
    } catch(e) {
        console.error(e);
        document.getElementById('wallets-list').innerHTML = '<p class="text-danger">Erreur de chargement</p>';
    }
}

// Récupérer TOUS les VEIL d'un wallet (depuis le tableau)
async function recoverWallet(walletName) {
    const toWallet = prompt("Wallet destination (ex: treasury):", "treasury");
    if (!toWallet) return;
    
    const reason = prompt("Raison:", "Récupération admin");
    if (!reason) return;
    
    const res = await fetch('/api/admin/recover_veil', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            admin_seed: adminSeed,
            from_wallet: walletName,
            to_wallet: toWallet,
            reason: reason
        })
    });
    const data = await res.json();
    alert(data.message);
    if (data.success) loadWallets();
}

// Récupération depuis le formulaire
document.getElementById('recover-btn').onclick = async () => {
    const fromWallet = document.getElementById('recover-from').value;
    const toWallet = document.getElementById('recover-to').value;
    const reason = document.getElementById('recover-reason').value;
    
    if (!fromWallet) {
        alert("Entrez le wallet source");
        return;
    }
    
    const res = await fetch('/api/admin/recover_veil', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            admin_seed: adminSeed,
            from_wallet: fromWallet,
            to_wallet: toWallet,
            reason: reason || "Récupération admin"
        })
    });
    const data = await res.json();
    alert(data.message);
    if (data.success) {
        loadWallets();
        document.getElementById('recover-from').value = '';
        document.getElementById('recover-reason').value = '';
    }
};

async function updateRep(wallet, action) {
    try {
        const res = await fetch('/api/admin/update_reputation', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({admin_seed: adminSeed, wallet: wallet, action: action})
        });
        const data = await res.json();
        alert(data.message);
        loadWallets();
    } catch(e) {
        alert('Erreur: ' + e.message);
    }
}

async function setScore(wallet) {
    const score = prompt("Nouveau score (0-100):", "50");
    if (score !== null) {
        try {
            const res = await fetch('/api/admin/update_reputation', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({admin_seed: adminSeed, wallet: wallet, action: 'set_score', value: parseInt(score)})
            });
            const data = await res.json();
            alert(data.message);
            loadWallets();
        } catch(e) {
            alert('Erreur: ' + e.message);
        }
    }
}

async function banWallet(wallet) {
    if (!confirm(`Bannir définitivement ${wallet} ?`)) return;
    const reason = prompt("Raison du bannissement:");
    if (!reason) return;
    
    try {
        const res = await fetch('/api/admin/ban_wallet', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({admin_seed: adminSeed, wallet: wallet, reason: reason})
        });
        const data = await res.json();
        alert(data.message);
        loadWallets();
    } catch(e) {
        alert('Erreur: ' + e.message);
    }
}

document.getElementById('logout-btn').onclick = () => {
    sessionStorage.removeItem('admin_seed');
    window.location.href = '/admin/login';
};

loadWallets();
setInterval(loadWallets, 30000);
</script>
{% endblock %}
