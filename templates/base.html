<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VeilCoin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-lg">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🌫️ VeilCoin</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/wallet"><i class="fas fa-wallet"></i> Wallet</a></li>
                   
                    <li class="nav-item"><a class="nav-link" href="/blockchain"><i class="fas fa-cubes"></i> Blockchain</a></li>
                    <li class="nav-item"><a class="nav-link" href="/market"><i class="fas fa-handshake"></i> Marché</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container-fluid py-4">{% block content %}{% endblock %}</main>
    <footer class="bg-black text-center text-muted py-3"><small>VeilCoin v1.0 - Mine Simply. Transact Privately.</small></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
