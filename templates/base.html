<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeilCoin - {% block title %}Cryptomonnaie Privée{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #ffffff; }
        .navbar { background-color: #1a1a1a !important; border-bottom: 1px solid #00ff88; }
        .navbar-brand { color: #00ff88 !important; font-weight: bold; }
        .nav-link { color: #ffffff !important; }
        .nav-link:hover { color: #00ff88 !important; }
        .card { background-color: #1a1a1a; border: 1px solid #333; }
        .btn-primary { background-color: #00ff88; border: none; color: #000; }
        .btn-primary:hover { background-color: #00cc66; }
        .btn-success { background-color: #28a745; }
        .text-primary { color: #00ff88 !important; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">⛓️ VeilCoin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">🏠 Accueil</a>
                    </li>
                                        </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/blockchain">⛓️ Blockchain</a>
                    </li>
                                      </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/p2p">🤝 P2P</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
