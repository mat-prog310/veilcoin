<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeilCoin - {% block title %}Cryptomonnaie Privée{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* RESET COMPLET - TOUT EN BLANC */
        body, html {
            background-color: #000000 !important;
            color: #ffffff !important;
        }
        
        /* FORCER TOUS LES TEXTES EN BLANC */
        body, p, span, div, li, td, th, label, .card, .card-body, .card-header, 
        .card-footer, .table, .table td, .table th, .nav-link, .navbar-brand, 
        .navbar-nav .nav-link, .form-control, .form-control::placeholder, 
        .btn, .modal, .modal-content, .modal-header, .modal-body, .modal-footer, 
        .alert, .badge, code, pre, .text-muted, small, strong, h1, h2, h3, h4, h5, h6,
        input, textarea, select, option, .list-group-item, .breadcrumb, .breadcrumb-item {
            color: #ffffff !important;
        }
        
        /* Couleurs spéciales conservées */
        .text-primary, .text-primary * { color: #00ff88 !important; }
        .text-success, .text-success * { color: #00ff88 !important; }
        .text-danger, .text-danger * { color: #ff6666 !important; }
        .text-warning, .text-warning * { color: #ffc107 !important; }
        
        /* Backgrounds */
        .card, .card-body, .card-header, .card-footer, .modal-content, .list-group-item {
            background-color: #111111 !important;
        }
        
        /* Tables */
        .table, .table-dark {
            background-color: #0a0a0a !important;
        }
        .table td, .table th {
            background-color: #0a0a0a !important;
            border-color: #333333 !important;
        }
        .table thead th {
            background-color: #1a1a1a !important;
            color: #00ff88 !important;
        }
        
        /* Formulaires */
        .form-control, input, textarea, select {
            background-color: #1a1a1a !important;
            border: 1px solid #333333 !important;
            color: #ffffff !important;
        }
        .form-control:focus {
            border-color: #00ff88 !important;
            outline: none;
        }
        
        /* Boutons */
        .btn-primary { background-color: #00ff88 !important; color: #000000 !important; }
        .btn-success { background-color: #28a745 !important; color: #ffffff !important; }
        .btn-danger { background-color: #dc3545 !important; color: #ffffff !important; }
        .btn-warning { background-color: #ffc107 !important; color: #000000 !important; }
        .btn-secondary { background-color: #6c757d !important; color: #ffffff !important; }
        
        /* Navbar */
        .navbar { background-color: #0a0a0a !important; border-bottom: 2px solid #00ff88 !important; }
        .navbar-brand { color: #00ff88 !important; }
        .nav-link { color: #ffffff !important; }
        .nav-link:hover { color: #00ff88 !important; }
        
        /* Badges */
        .badge.bg-success { background-color: #00ff88 !important; color: #000000 !important; }
        .badge.bg-danger { background-color: #dc3545 !important; color: #ffffff !important; }
        .badge.bg-warning { background-color: #ffc107 !important; color: #000000 !important; }
        
        /* Modals */
        .modal-content { background-color: #1a1a1a !important; border: 1px solid #00ff88 !important; }
        
        /* Onglets */
        .nav-tabs .nav-link { background-color: #1a1a1a !important; color: #cccccc !important; }
        .nav-tabs .nav-link.active { background-color: #00ff88 !important; color: #000000 !important; }
        
        /* Liens */
        a { color: #00ff88 !important; text-decoration: none; }
        a:hover { color: #00cc66 !important; }
        
        /* Code */
        code { background-color: #1a1a1a !important; color: #00ff88 !important; }
        
        /* Footer */
        footer { background-color: #0a0a0a !important; color: #666666 !important; border-top: 1px solid #222 !important; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">⛓️ VeilCoin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">🏠 Accueil</a></li>
                                        <li class="nav-item"><a class="nav-link" href="/blockchain">⛓️ Blockchain</a></li>
                                        <li class="nav-item"><a class="nav-link" href="/p2p">🤝 P2P</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    
    <footer class="text-center py-3 mt-4">
        <small>&copy; 2026 VeilCoin - Mine Simply. Transact Privately.</small>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
