<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VeilCoin{% endblock %}</title>
    <style>
        body{background:#0a0a1a;color:#fff;font-family:Arial,sans-serif;}
        .card{background:#1a1a2e;border-radius:10px;padding:15px;margin-bottom:15px;}
        .container{max-width:1200px;margin:0 auto;padding:20px;}
        .row{display:flex;flex-wrap:wrap;gap:15px;}
        .col-md-3{flex:1;min-width:200px;}
        .col-md-4{flex:1;min-width:250px;}
        .col-md-6{flex:2;min-width:300px;}
        h1,h2,h3,h5{color:#fff;}
        code{color:#20c997;background:#0d0d1a;padding:2px 8px;border-radius:5px;}
        .btn{padding:10px 20px;border:none;border-radius:5px;cursor:pointer;}
        input,textarea,select{background:#0d0d1a;border:1px solid #333;color:#fff;padding:8px;border-radius:5px;width:100%;}
        table{width:100%;border-collapse:collapse;}
        th{color:#20c997;text-align:left;padding:8px;}
        td{color:#fff;padding:8px;border-bottom:1px solid #222;}
        .navbar{background:#000;padding:15px;display:flex;justify-content:space-between;}
        .navbar a{color:#fff;text-decoration:none;margin:0 10px;}
        footer{text-align:center;padding:20px;color:#666;border-top:1px solid #222;}
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="navbar">
        <a href="/" style="color:#20c997;font-weight:bold;">🌫️ VeilCoin</a>
        <div>
            <a href="/">Dashboard</a>
            <a href="/wallet">Wallet</a>
            <a href="/blockchain">Blockchain</a>
            <a href="/market">Marché</a>
        </div>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>VeilCoin v1.5.0</footer>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
