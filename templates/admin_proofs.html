{% extends "base.html" %}

{% block title %}Admin - Preuves{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="text-center mb-4">🛡️ Administration - Preuves de paiement</h1>
    
    <div class="card bg-dark">
        <div class="card-header">
            <h4>📸 Preuves en attente</h4>
            <button id="logout-btn" class="btn btn-sm btn-danger float-end">Déconnexion</button>
        </div>
        <div class="card-body">
            <div id="proofs-list" class="text-center">
                <p>Chargement...</p>
            </div>
        </div>
    </div>
</div>

<script>
const adminSeed = sessionStorage.getItem('admin_seed');
if (!adminSeed) {
    window.location.href = '/admin/login';
}

async function loadProofs() {
    const res = await fetch('/api/admin/pending_proofs?admin_seed=' + adminSeed);
    const data = await res.json();
    
    const container = document.getElementById('proofs-list');
    if (!data.orders || data.orders.length === 0) {
        container.innerHTML = '<p>Aucune preuve en attente</p>';
        return;
    }
    
    let html = '<div class="table-responsive"><table class="table table-dark">';
    html += '<thead><tr><th>ID</th><th>VEIL</th><th>Total EUR</th><th>Buyer</th><th>Seller</th><th>Preuve</th><th>Action</th></tr></thead><tbody>';
    
    for (let o of data.orders) {
        html += `<tr>
            <td>${o.id}</td>
            <td>${o.amount_veil}</td>
            <td>${o.total_eur} EUR</td>
            <td>${o.buyer}</td>
            <td>${o.seller}</td>
            <td><a href="/api/admin/view_proof/${o.payment_proof}?admin_seed=${adminSeed}" target="_blank" class="btn btn-sm btn-info">📸 Voir</a></td>
            <td><button class="btn btn-sm btn-success" onclick="validateProof('${o.id}', 'accept')">✅ Valider</button>
            <button class="btn btn-sm btn-danger" onclick="validateProof('${o.id}', 'reject')">❌ Rejeter</button></td>
        </tr>`;
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;
}

async function validateProof(orderId, action) {
    const res = await fetch('/api/admin/validate_proof', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({admin_seed: adminSeed, order_id: orderId, action: action})
    });
    const data = await res.json();
    alert(data.message);
    loadProofs();
}

document.getElementById('logout-btn').onclick = () => {
    sessionStorage.removeItem('admin_seed');
    window.location.href = '/admin/login';
};

loadProofs();
</script>
{% endblock %}
