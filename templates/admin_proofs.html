{% extends "base.html" %}

{% block title %}Admin - Preuves P2P{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="text-center mb-4">🛡️ Administration - Preuves de paiement</h1>
    
    <div class="card bg-dark">
        <div class="card-header">
            <h4>📸 Preuves en attente</h4>
        </div>
        <div class="card-body">
            <div id="proofs-list">
                <p>Chargement...</p>
            </div>
        </div>
    </div>
</div>

<script>
async function loadProofs() {
    const adminSeed = prompt("Seed admin :");
    const res = await fetch('/api/p2p/orders?admin_seed=' + adminSeed);
    const data = await res.json();
    
    const container = document.getElementById('proofs-list');
    let html = '<div class="table-responsive"><table class="table table-dark">';
    html += '<thead><tr><th>ID</th><th>Offre</th><th>Preuve</th><th>Action</th></tr></thead><tbody>';
    
    for (let order of data.orders) {
        if (order.payment_proof) {
            html += `<tr>
                <td>${order.id}</td>
                <td>${order.amount_veil} VEIL</td>
                <td><a href="/api/admin/view_proof/${order.payment_proof}?admin_seed=${adminSeed}" target="_blank">📸 Voir</a></td>
                <td><button class="btn btn-sm btn-success" onclick="validate('${order.id}')">✅ Valider</button></td>
            </tr>`;
        }
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;
}

function validate(orderId) {
    const adminSeed = prompt("Seed admin :");
    fetch('/api/admin/validate_proof', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({admin_seed: adminSeed, order_id: orderId, action: 'accept'})
    }).then(r => r.json()).then(data => alert(data.message));
}

loadProofs();
</script>
{% endblock %}
