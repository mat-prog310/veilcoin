{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1 class="text-center mb-4">🏠 VeilCoin Dashboard</h1>
    
    <div class="row">
        <div class="col-md-3 mb-3">
            <div class="card bg-dark border-primary h-100">
                <div class="card-body text-center">
                    <h5 class="text-primary">Hauteur</h5>
                    <h2>{{ stats.height }}</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card bg-dark border-success h-100">
                <div class="card-body text-center">
                    <h5 class="text-success">Difficulté</h5>
                    <h2>{{ stats.difficulty }}</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card bg-dark border-warning h-100">
                <div class="card-body text-center">
                    <h5 class="text-warning">Brûlé</h5>
                    <h2>{{ "%.2f"|format(stats.total_burned) }} VEIL</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card bg-dark border-info h-100">
                <div class="card-body text-center">
                    <h5 class="text-info">Mempool</h5>
                    <h2>{{ stats.mempool_size }}</h2>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
