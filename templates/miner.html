<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeilCoin - Mineur Sécurisé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #0a0a1a; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .card { background: #1a1a2e; border: 1px solid #333; border-radius: 15px; }
        .btn-start { background: #00ff88; color: #000; font-weight: bold; font-size: 1.2em; padding: 15px; }
        .btn-stop { background: #ff3366; color: #fff; font-weight: bold; font-size: 1.2em; padding: 15px; }
        .stat { font-size: 2em; font-weight: bold; }
        .security-bar { height: 20px; background: #333; border-radius: 10px; overflow: hidden; }
        .security-fill { height: 100%; background: linear-gradient(90deg, #ffc107, #00ff88); transition: width 1s; }
    </style>
</head>
<body>
    <div class="container py-4">
        <h1 class="text-center mb-4">🔒 VeilCoin Mineur Sécurisé</h1>
        
        <div id="login-section" class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h4 class="text-center mb-3">🔐 Connexion</h4>
                    <input type="text" id="login-name" class="form-control bg-dark text-white mb-2" placeholder="Nom du wallet">
                    <textarea id="login-seed" class="form-control bg-dark text-white mb-3" rows="2" placeholder="Seed phrase (12 mots)"></textarea>
                    <button class="btn btn-start w-100" onclick="login()">Se connecter</button>
                    <div id="login-msg" class="mt-2 text-center"></div>
                </div>
            </div>
        </div>
        
        <div id="miner-section" style="display:none;">
            <div class="row mb-3">
                <div class="col-md-3"><div class="card p-3 text-center"><small>💰 Solde VEIL</small><div id="balance" class="stat" style="color:#00ff88;">0</div></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><small>⚡ Hashrate</small><div id="hashrate" class="stat" style="color:#0dcaf0;">0</div></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><small>📦 Blocs</small><div id="blocks" class="stat" style="color:#ffc107;">0</div></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><small>🎯 Difficulté</small><div id="difficulty" class="stat" style="color:#e94560;">3</div></div></div>
            </div>
            
            <!-- Barre de sécurité -->
            <div class="card p-3 mb-3">
                <small>🛡️ Sécurité du réseau</small>
                <div class="security-bar">
                    <div id="security-fill" class="security-fill" style="width: 0%;"></div>
                </div>
                <div class="text-end"><small id="security-text">0%</small></div>
            </div>
            
            <div class="text-center mb-4">
                <button id="start-btn" class="btn btn-start" onclick="startMining()">🔒 DÉMARRER LE MINAGE SÉCURISÉ</button>
                <button id="stop-btn" class="btn btn-stop" onclick="stopMining()" style="display:none;">⏹ ARRÊTER</button>
                <div id="status" class="mt-2" style="font-size:1.2em;"></div>
            </div>
            
            <div class="card p-3">
                <canvas id="chart" height="200"></canvas>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://veilcoin-fvzp.onrender.com';
        const socket = io(API);
        let walletName = '';
        let chart;

        async function login() {
            const name = document.getElementById('login-name').value.trim();
            const seed = document.getElementById('login-seed').value.trim();
            if (!name || !seed) return;
            
            const res = await fetch(`${API}/api/wallet/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, seed_phrase: seed})
            });
            const data = await res.json();
            
            if (data.success) {
                walletName = data.name;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('miner-section').style.display = 'block';
                document.getElementById('balance').textContent = data.balance.toFixed(4);
                
                const ctx = document.getElementById('chart').getContext('2d');
                chart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: [], datasets: [{ label: 'Hashrate (H/s)', data: [], borderColor: '#ffc107', backgroundColor: 'rgba(255,193,7,0.2)', tension: 0.4, fill: true }] },
                    options: { responsive: true, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
                });
            } else {
                document.getElementById('login-msg').innerHTML = `<span style="color:red;">❌ ${data.error}</span>`;
            }
        }

        async function startMining() {
            const res = await fetch(`${API}/api/miner/start`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({wallet: walletName})
            });
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('stop-btn').style.display = 'inline-block';
                document.getElementById('status').innerHTML = '<span style="color:#00ff88;">🔒 Minage sécurisé en cours...</span>';
            } else {
                alert('Erreur: ' + (data.error || 'Inconnue'));
            }
        }

        async function stopMining() {
            await fetch(`${API}/api/miner/stop`);
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('stop-btn').style.display = 'none';
            document.getElementById('status').innerHTML = '<span style="color:#aaa;">⚪ Arrêté</span>';
        }

        socket.on('miner_stats', s => {
            document.getElementById('hashrate').textContent = Math.round(s.hashrate || 0);
            document.getElementById('blocks').textContent = s.blocks_mined || 0;
            document.getElementById('difficulty').textContent = s.current_difficulty || 3;
            
            // Barre de sécurité
            const security = Math.min(100, (s.network_security || 0) / 1e6 * 10);
            document.getElementById('security-fill').style.width = security + '%';
            document.getElementById('security-text').textContent = 'Niveau ' + Math.round(security) + '%';
            
            const now = new Date().toLocaleTimeString();
            if (chart) {
                chart.data.labels.push(now);
                chart.data.datasets[0].data.push(s.hashrate || 0);
                if (chart.data.labels.length > 30) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                chart.update();
            }
            
            fetch(`${API}/api/wallet/${walletName}/balance`)
                .then(r => r.json())
                .then(d => { document.getElementById('balance').textContent = d.balance_veil.toFixed(4); });
        });
    </script>
</body>
</html>
