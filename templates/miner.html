{% extends "base.html" %}
{% block title %}VeilCoin - Mineur{% endblock %}
{% block content %}
<div class="container">
    <h1 class="mb-4"><i class="fas fa-microchip text-warning"></i> Mineur</h1>
    <div class="row">
        <div class="col-md-4 mb-3"><div class="card bg-dark"><div class="card-body text-center"><h5>Contrôle</h5><select id="miner-wallet" class="form-select mb-3">{% for w in wallets %}<option value="{{ w }}">{{ w }}</option>{% endfor %}</select><button id="start-btn" class="btn btn-success w-100 mb-2" onclick="startMining()"><i class="fas fa-play"></i> Démarrer</button><button id="stop-btn" class="btn btn-danger w-100" onclick="stopMining()"><i class="fas fa-stop"></i> Arrêter</button><div id="mining-status" class="mt-3"><div class="alert alert-secondary">⚪ Arrêté</div></div></div></div></div>
        <div class="col-md-8 mb-3"><div class="card bg-dark"><div class="card-body"><h5>Statistiques</h5><div class="row"><div class="col-md-4 text-center"><h3 id="hashrate" class="text-primary">0</h3><small>H/s</small></div><div class="col-md-4 text-center"><h3 id="blocks-found" class="text-success">0</h3><small>Blocs</small></div><div class="col-md-4 text-center"><h3 id="shares" class="text-info">0</h3><small>Shares</small></div></div><canvas id="minerChart" height="200"></canvas></div></div></div>
    </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
const socket=io();
const ctx=document.getElementById('minerChart').getContext('2d');
const chart=new Chart(ctx,{type:'line',data:{labels:[],datasets:[{label:'H/s',data:[],borderColor:'#ffc107',tension:0.4}]},options:{responsive:true,scales:{y:{ticks:{color:'#fff'}},x:{ticks:{color:'#fff'}}}}});
async function startMining(){const w=document.getElementById('miner-wallet').value;await fetch('/api/miner/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({wallet:w})});document.getElementById('start-btn').disabled=true;document.getElementById('stop-btn').disabled=false;document.getElementById('mining-status').innerHTML='<div class="alert alert-success">⛏️ Minage en cours...</div>'}
async function stopMining(){await fetch('/api/miner/stop');document.getElementById('start-btn').disabled=false;document.getElementById('stop-btn').disabled=true;document.getElementById('mining-status').innerHTML='<div class="alert alert-secondary">⚪ Arrêté</div>'}
socket.on('miner_stats',s=>{document.getElementById('hashrate').textContent=Math.round(s.hashrate);document.getElementById('blocks-found').textContent=s.blocks_mined;document.getElementById('shares').textContent=s.accepted_shares;const now=new Date().toLocaleTimeString();chart.data.labels.push(now);chart.data.datasets[0].data.push(s.hashrate);if(chart.data.labels.length>30){chart.data.labels.shift();chart.data.datasets[0].data.shift()}chart.update()});
</script>
{% endblock %}
