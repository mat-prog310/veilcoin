{% extends "base.html" %}
{% block title %}VeilCoin - Mineur{% endblock %}
{% block content %}
<div class="container">
    <h1 class="mb-4" style="color: #ffc107;"><i class="fas fa-microchip"></i> Mineur VeilCoin</h1>
    
    <div class="row">
        <div class="col-md-4 mb-3">
            <div class="card" style="background: #1a1a2e; border: 2px solid #ffc107; border-radius: 15px;">
                <div class="card-body text-center">
                    <h5 style="color: #ffc107;">🎮 Contrôle du mineur</h5>
                    <div class="mb-3">
                        <label style="color: #fff;">Wallet mineur</label>
                        <select id="miner-wallet" class="form-select" style="background: #0d0d1a; color: #fff; border: 1px solid #ffc107;">
                            {% for w in wallets %}
                            <option value="{{ w }}">{{ w }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button id="start-btn" class="btn w-100 mb-2" style="background: #198754; color: #fff; font-size: 1.1em;" onclick="startMining()">
                        ▶ Démarrer le minage
                    </button>
                    <button id="stop-btn" class="btn w-100" style="background: #dc3545; color: #fff; font-size: 1.1em;" onclick="stopMining()">
                        ⏹ Arrêter le minage
                    </button>
                    <div id="mining-status" class="mt-3" style="color: #fff; font-weight: bold;">⚪ Mineur arrêté</div>
                </div>
            </div>
        </div>
        
        <div class="col-md-8 mb-3">
            <div class="card" style="background: #1a1a2e; border: 2px solid #6f42c1; border-radius: 15px;">
                <div class="card-body">
                    <h5 style="color: #6f42c1;">📊 Statistiques en temps réel</h5>
                    <div class="row mb-3">
                        <div class="col-md-3 text-center">
                            <h3 id="hashrate" style="color: #0dcaf0;">0</h3>
                            <small style="color: #aaa;">Hashrate (H/s)</small>
                        </div>
                        <div class="col-md-3 text-center">
                            <h3 id="blocks-found" style="color: #198754;">0</h3>
                            <small style="color: #aaa;">Blocs trouvés</small>
                        </div>
                        <div class="col-md-3 text-center">
                            <h3 id="shares" style="color: #ffc107;">0</h3>
                            <small style="color: #aaa;">Shares</small>
                        </div>
                        <div class="col-md-3 text-center">
                            <h3 id="difficulty" style="color: #e94560;">2</h3>
                            <small style="color: #aaa;">Difficulté</small>
                        </div>
                    </div>
                    <canvas id="minerChart" height="250"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
const socket = io();
const ctx = document.getElementById('minerChart').getContext('2d');
const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Hashrate (H/s)',
            data: [],
            borderColor: '#ffc107',
            backgroundColor: 'rgba(255, 193, 7, 0.2)',
            tension: 0.4,
            fill: true,
            borderWidth: 2
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { labels: { color: '#fff' } } },
        scales: {
            y: { ticks: { color: '#fff' }, beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } },
            x: { ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } }
        }
    }
});

async function startMining() {
    const wallet = document.getElementById('miner-wallet').value;
    if (!wallet) { alert('Sélectionne un wallet !'); return; }
    
    console.log('Démarrage minage pour', wallet);
    
    try {
        const res = await fetch('/api/miner/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({wallet: wallet})
        });
        
        const data = await res.json();
        console.log('Réponse:', data);
        
        if (data.success) {
            document.getElementById('start-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
            document.getElementById('mining-status').innerHTML = '<span style="color: #198754;">⛏️ Minage en cours...</span>';
        } else {
            alert('Erreur: ' + (data.error || 'Inconnue'));
        }
    } catch (e) {
        console.error('Erreur:', e);
        alert('Erreur de connexion au serveur');
    }
}

async function stopMining() {
    try {
        const res = await fetch('/api/miner/stop');
        const data = await res.json();
        console.log('Stop:', data);
        
        document.getElementById('start-btn').disabled = false;
        document.getElementById('stop-btn').disabled = true;
        document.getElementById('mining-status').innerHTML = '<span style="color: #aaa;">⚪ Mineur arrêté</span>';
    } catch (e) {
        console.error('Erreur:', e);
    }
}

// Temps réel
socket.on('miner_stats', function(stats) {
    console.log('Stats reçues:', stats);
    document.getElementById('hashrate').textContent = Math.round(stats.hashrate || 0);
    document.getElementById('blocks-found').textContent = stats.blocks_mined || 0;
    document.getElementById('shares').textContent = stats.accepted_shares || 0;
    document.getElementById('difficulty').textContent = stats.current_difficulty || 2;
    
    const now = new Date().toLocaleTimeString();
    chart.data.labels.push(now);
    chart.data.datasets[0].data.push(stats.hashrate || 0);
    
    if (chart.data.labels.length > 30) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }
    chart.update();
});

socket.on('connect', () => console.log('✅ Connecté au serveur'));
socket.on('disconnect', () => console.log('❌ Déconnecté'));
</script>
{% endblock %}
